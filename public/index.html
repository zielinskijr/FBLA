<!doctype html>
<html>
    <head>
        <title>virutal pet</title>
        <link rel="stylesheet" href="css/main.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta charset="utf-8" />
    </head>

    <body>
        <main>
            <div id="pet"></div>
            <hr />
            <div id="stats"></div>
            <div id="warnings"></div>
            <hr />
            <h2>actions</h2>
            <div id="actions">
                <h3>interaction</h3>
                <button class="feed" onclick="feed()">feed</button>
                <button class="play" onclick="play()">play</button>
                <button class="clean" onclick="clean()">clean</button>
                <button class="bed" id="bed" onclick="bed()">send to bed</button>

                <h3>places</h3>
                <button class="hospital" onclick="hospital()">send to the hospital</button>
                <button class="petShow" onclick="petShow()">go to a pet show</button>
            </div>
        </main>
    <script type="module" src="js/main.js"></script>
    </body>
</html>
